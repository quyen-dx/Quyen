<div class="h-screen  bg-gray-500">
    <div class=" h-[500px] p-[100px]">
        <div class=" w-full min-w-[500px]  bg-gray-300 border border-gray-600 p-8 rounded-[20px]">
            <form nz-form nzLayout="vertical" [formGroup]="useform" (ngSubmit)="onSubmit()">
                <nz-form-item>
                    <nz-form-control nzErrorTip="Name khong de trong">
                        <nz-form-label nzRequired="">Name</nz-form-label>
                        <nz-icon nzInputPrefix nzType="user" />
                        <input formControlName="name" nz-input placeholder="name" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item>
                    <nz-form-control nzErrorTip="Email khong de trong">
                        <nz-form-label nzRequired="">Email</nz-form-label>
                        <nz-icon nzInputPrefix nzType="email" />
                        <input type="email" formControlName="email" nz-input placeholder="email" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item>
                    <nz-form-control nzErrorTip="password khong de trong">
                        <nz-form-label nzRequired="">Password</nz-form-label>
                        <nz-input-password>
                            <nz-icon nzInputPrefix nzType="lock" />
                            <input formControlName="password" nz-input placeholder="Password" />
                        </nz-input-password>
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item>
                    <nz-form-control nzErrorTip="role khong de trong">
                        <nz-form-label nzRequired="">Role</nz-form-label>
                        <nz-select formControlName="role" nzPlaceHolder="-- chon role --">
                            <nz-option nzValue="user" nzLabel="User">User</nz-option>
                            <nz-option nzValue="admin" nzLabel="Admin">Admin</nz-option>
                        </nz-select>
                    </nz-form-control>
                </nz-form-item>



                <nz-form-item class="text-center mt-[10px]">
                    <nz-form-control>
                        <button nz-button nzType="primary">Thêm</button>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </div>
    </div>
</div>
