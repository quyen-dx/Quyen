<nz-layout>
      <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed" [nzTrigger]="null">
        <div class="logo text-white flex items-center justify-center text-bold text-3xl">ADMIN</div>
        <ul nz-menu nzTheme="dark" nzMode="inline">
          <li nz-submenu nzTitle="Product" nzIcon="product">
            <ul>
              <li nz-menu-item><a routerLink="/admin/product">Product all</a></li>
              <li nz-menu-item><a routerLink="/admin/product/add">Thêm Product</a></li>
            </ul>
          </li>
          <li nz-submenu nzTitle="Categories" nzIcon="product">
            <ul>
              <li nz-menu-item><a routerLink="/admin/category">Categories all</a></li>
              <li nz-menu-item><a routerLink="/admin/category/add">Thêm Categories</a></li>
            </ul>
          </li>
          <li nz-submenu nzTitle="Auth" nzIcon="user">
            <ul>
              <li nz-menu-item><a routerLink="/admin/auth">Auth all</a></li>
              <li nz-menu-item><a routerLink="/admin/auth/add">Thêm auth</a></li>
            </ul>
          </li>
          <li nz-menu-item>
            <nz-icon nzType="file" />
            <span>File</span>
          </li>
        </ul>
      </nz-sider>
      <nz-layout>
        <nz-header>
          <nz-icon
            class="trigger"
            [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"
            (click)="isCollapsed = !isCollapsed"
          />
        </nz-header>
        <nz-content>
          <nz-breadcrumb>
            <nz-breadcrumb-item>User</nz-breadcrumb-item>
            <nz-breadcrumb-item>Bill</nz-breadcrumb-item>
          </nz-breadcrumb>
          <div class="inner-content">
            <h1 class=" font-bold text-5xl text-red-900 text-center mb-9">Admin Page</h1>
            <router-outlet/>
          </div>
        </nz-content>
        <nz-footer>Ant Design ©{{ date.getFullYear() }} Implement By Angular</nz-footer>
      </nz-layout>
    </nz-layout>
