<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
<script src="https://cdn.tailwindcss.com"></script>

<div id="topbar" class="bg-black text-white text-xs sm:text-sm py-2.5">
  <div class="max-w-[1440px] mx-auto px-4 sm:px-10 md:px-16 lg:px-24 flex items-center">
    <div class="flex-1"></div>
    <p class="flex-1 text-center whitespace-nowrap">
      Sign up and get 20% off to your first order.
      <a href="#" class="underline font-semibold ml-1">Sign Up Now</a>
    </p>
    <div class="flex-1 flex justify-end">
      <button onclick="document.getElementById('topbar').remove()" class="text-white text-xl leading-none hover:opacity-70 transition">
        &times;
      </button>
    </div>
  </div>
</div>

<header class="bg-white border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-[1440px] mx-auto px-4 sm:px-10 md:px-16 lg:px-24 h-16 md:h-20 flex items-center justify-between gap-6">


    <div class="flex items-center gap-4 shrink-0">
      <button class="md:hidden text-xl text-black">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a href="#" class="text-2xl md:text-[32px] font-[1000] tracking-tighter text-black uppercase">
        SHOP.CO
      </a>
    </div>


    <nav class="hidden md:flex items-center gap-6 text-base font-normal text-black shrink-0">
      <a href="#" class="flex items-center gap-1 hover:text-gray-600 transition">
        Shop <i class="fa-solid fa-chevron-down text-[10px]"></i>
      </a>
      <a href="#" class="hover:text-gray-600 transition whitespace-nowrap">On Sale</a>
      <a href="#" class="hover:text-gray-600 transition whitespace-nowrap">New Arrivals</a>
      <a href="#" class="hover:text-gray-600 transition whitespace-nowrap">Brands</a>
    </nav>


    <div class="hidden md:flex flex-1 items-center bg-[#F0F0F0] rounded-full px-4 py-3 gap-3">
      <i class="fa-solid fa-magnifying-glass text-gray-400 text-lg shrink-0"></i>
      <input
        type="text"
        placeholder="Search for products..."
        class="bg-transparent text-sm outline-none w-full text-black placeholder-gray-400"
      />
    </div>

    <div class="flex items-center gap-4 sm:gap-5 shrink-0">
      <button class="md:hidden text-xl text-black">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="text-2xl text-black hover:opacity-60 transition">
        <i class="fa-solid fa-cart-shopping"></i>
      </button>
      <button class="text-2xl text-black hover:opacity-60 transition">
        <i class="fa-regular fa-circle-user"></i>
      </button>
    </div>

  </div>
</header>
