<div class="max-w-[1440px] mx-auto px-4 sm:px-10 md:px-16 lg:px-24 py-8">
    <h1 class="text-2x1 font-[900] uppercase mb-6">kết quả tìm kiếm ({{products.length}})</h1>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div *ngFor="let p of products" class="group cursor-pointer" [routerLink]="['/detail',p.id]">
            <div class="bg-[#F0EEED] rounded-2xl overflow-hidden aspect-square mb-3">
                <img [src]="p.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" />
            </div>
            <h3 class="font-bold text-sm mb-1">{{p.name}}</h3>
            <p class="font-bold">{{p.price}}</p>
        </div>
    </div>
    <p *ngIf="products.length === 0">khong tahy san phan noa</p>
</div>
