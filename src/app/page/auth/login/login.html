<div class="min-h-screen flex items-center justify-center px-4 bg-gray-500">
    <div class="w-full max-w-[500px] bg-gray-300 border border-gray-600 p-8 rounded-[20px]">
        <form nz-form nzLayout="vertical" [formGroup]="useform" (ngSubmit)="onSubmit()">
            <nz-form-item>
                <nz-form-control nzErrorTip="Email khong de trong">
                    <nz-form-label nzRequired="">Email</nz-form-label>
                    <nz-icon nzInputPrefix nzType="email" />
                    <input type="email" formControlName="email" nz-input placeholder="email" />
                </nz-form-control>
            </nz-form-item>

            <nz-form-item>
                <nz-form-control nzErrorTip="password khong de trong">
                    <nz-form-label nzRequired="">Password</nz-form-label>
                    <nz-input-password>
                        <nz-icon nzInputPrefix nzType="lock" />
                        <input formControlName="password" nz-input placeholder="Password" />
                    </nz-input-password>
                </nz-form-control>
            </nz-form-item>

            <nz-form-item class="text-center mt-[10px]">
                <nz-form-control>
                    <button nz-button nzType="primary">đăng nhap</button>
                </nz-form-control>
            </nz-form-item>
        </form>
    </div>

</div>
