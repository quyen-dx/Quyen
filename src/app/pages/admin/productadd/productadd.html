<form nz-form [formGroup]="productform" (ngSubmit)="onclick()">

    <nz-form-item>
        <nz-form-control nzErrorTip="ten khong duoc de trong">
                <nz-icon nzInputPrefix nzType="name" />
                <input type="text" nz-input formControlName="name" placeholder="name" />
        </nz-form-control>
    </nz-form-item>

    <nz-form-item>
        <nz-form-control nzErrorTip="image not null">
                <nz-icon nzInputPrefix nzType="image" />
                <input type="text" nz-input formControlName="image" placeholder="image" />
        </nz-form-control>
    </nz-form-item>

    <nz-form-item>
        <nz-form-control nzErrorTip="price not null">
                <nz-icon nzInputPrefix nzType="price" />
                <input type="number" nz-input formControlName="price" placeholder="price" />
        </nz-form-control>
    </nz-form-item>
    
    <nz-form-item>
        <nz-form-control nzErrorTip="category not null">
                <nz-icon nzInputPrefix nzType="category" />
                <input type="text" nz-input formControlName="category" placeholder="category" />
        </nz-form-control>
    </nz-form-item>

    <button  nz-button class="login-form-button login-form-margin" nzType="primary" >Thêm</button>
</form>
