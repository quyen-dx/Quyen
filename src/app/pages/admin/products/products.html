<h1>Danh sách sản phẩm</h1>

<nz-table #productTable [nzData]="products">
    <thead>
        <tr>
            <th>Stt</th>
            <th>name</th>
            <th>image</th>
            <th>category</th>
            <th>price</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>

        @for (product of products; let i = $index;track product.id) {
        <tr>
            <td>{{i + 1}}</td>
            <td>{{product.name}}</td>
            <td><img [src]="product.image" alt="" style="width: 100px;"></td>
            <td>{{product.category}}</td>
            <td>{{product.price}}</td>
            <td class="flex gap-3">
                <button class="bg-yellow-500 text-white   px-4 py-2 rounded-2xl hover:bg-yellow-400"><a
                        style="color: #fff;" nz-button nzType="primary"
                        [routerLink]="['/admin/products/edit', product.id]">
                        Sửa
                    </a></button>
                <button class="bg-red-500 text-white   px-4 py-2 rounded-2xl hover:bg-red-400" style="color: #fff;"
                    (click)="delete(product.id, product.name)">
                    xoa
                </button>

            </td>
        </tr>
        }

    </tbody>
</nz-table>
